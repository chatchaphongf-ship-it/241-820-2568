<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System - รายงาน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>ระบบจัดการพนักงาน</h1>
        <a href="index.html">พนักงาน</a>
        <a href="checkin.html">เช็คอิน/เอาท์</a>
        <a href="report.html" class="active">รายงาน</a>
    </nav>

    <div class="container">

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- ฟอร์มเลือกเดือน -->
        <div class="card">
            <h2>รายงานสรุปรายเดือน</h2>
            <div class="btn-group">
                <div class="form-group" style="flex:1">
                    <label>ปี</label>
                    <input type="number" id="year" placeholder="เช่น 2026" value="2026">
                </div>
                <div class="form-group" style="flex:1">
                    <label>เดือน</label>
                    <select id="month">
                        <option value="1">มกราคม</option>
                        <option value="2">กุมภาพันธ์</option>
                        <option value="3" selected>มีนาคม</option>
                        <option value="4">เมษายน</option>
                        <option value="5">พฤษภาคม</option>
                        <option value="6">มิถุนายน</option>
                        <option value="7">กรกฎาคม</option>
                        <option value="8">สิงหาคม</option>
                        <option value="9">กันยายน</option>
                        <option value="10">ตุลาคม</option>
                        <option value="11">พฤศจิกายน</option>
                        <option value="12">ธันวาคม</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="loadReport()">ดูรายงาน</button>
        </div>

        <!-- ตารางรายงาน -->
        <div class="card">
            <h2 id="reportTitle">รายงาน</h2>
            <div id="reportLoading" class="loading">กดดูรายงานเพื่อโหลดข้อมูล</div>
            <table id="reportTable" style="display:none">
                <thead>
                    <tr>
                        <th>รหัส</th>
                        <th>ชื่อ-นามสกุล</th>
                        <th>ตำแหน่ง</th>
                        <th>แผนก</th>
                        <th>วันทำงาน</th>
                        <th>ชั่วโมงรวม</th>
                        <th>OT (ชม.)</th>
                    </tr>
                </thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="report.js"></script>
</body>
</html>
