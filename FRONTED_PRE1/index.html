<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System - พนักงาน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>ระบบจัดการพนักงาน</h1>
        <a href="index.html" class="active">พนักงาน</a>
        <a href="checkin.html">เช็คอิน/เอาท์</a>
        <a href="report.html">รายงาน</a>
    </nav>

    <div class="container">

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Form เพิ่มพนักงาน -->
        <div class="card">
            <h2>เพิ่มพนักงานใหม่</h2>
            <div class="form-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="name" placeholder="กรอกชื่อ-นามสกุล">
            </div>
            <div class="form-group">
                <label>ตำแหน่ง</label>
                <input type="text" id="position" placeholder="กรอกตำแหน่ง">
            </div>
            <div class="form-group">
                <label>แผนก</label>
                <input type="text" id="department" placeholder="กรอกแผนก">
            </div>
            <button class="btn btn-primary" onclick="addEmployee()">เพิ่มพนักงาน</button>
        </div>

        <!-- ตารางพนักงาน -->
        <div class="card">
            <h2>รายชื่อพนักงานทั้งหมด</h2>
            <div id="loading" class="loading">กำลังโหลด...</div>
            <table id="empTable" style="display:none">
                <thead>
                    <tr>
                        <th>รหัส</th>
                        <th>ชื่อ-นามสกุล</th>
                        <th>ตำแหน่ง</th>
                        <th>แผนก</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="empBody"></tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
